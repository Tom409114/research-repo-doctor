name: Research Repo Doctor

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rrdoctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Tom409114/research-repo-doctor@v0.2.21
        with:
          profile: standard
          fail-on: warning
          output: rrdoctor-report.md
          plan: "true"
          appendix: "true"
          verify: "true"
