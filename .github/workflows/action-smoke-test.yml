name: Action smoke test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  action-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: examples/minimal-research-project
          profile: minimal
          fail-on: none
          output: rrdoctor-action-report.md
          plan: "true"
          comment-pr: "true"
          step-summary: "true"
