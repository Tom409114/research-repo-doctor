name: Action smoke test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  action-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: examples/minimal-research-project
          profile: minimal
          fail-on: none
          output: rrdoctor-action-report.md
