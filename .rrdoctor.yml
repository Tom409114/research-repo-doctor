version: 1
profile: standard
paths:
  include:
    - "."
  exclude:
    - ".git"
    - ".venv"
    - "node_modules"
    - "__pycache__"
    - ".mypy_cache"
    - ".pytest_cache"
    - ".ruff_cache"
    - "dist"
    - "build"
    - "tests/fixtures"
    - "examples/unseeded-ml-repo"
    - "examples/reports"
    - "evaluation/reports"
    - "rrdoctor-report.md"
    - "rrdoctor-self-report.md"
thresholds:
  large_file_mb: 50
  large_notebook_output_kb: 1024
rules:
  RRD032:
    enabled: false
fail_on: error
report:
  format: markdown
  output: rrdoctor-report.md
