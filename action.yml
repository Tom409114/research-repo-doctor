name: Research Repo Doctor
description: Prepare research artifacts for AE review with reproducibility scans, PR comments, fix plans, and appendices.
author: Research Repo Doctor Maintainers
branding:
  icon: check-circle
  color: green
inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  config:
    description: Optional path to .rrdoctor.yml.
    required: false
    default: ""
  profile:
    description: "Profile: minimal, standard, strict, ml, ml-paper, neurips, icml, acm, fair4rs, joss."
    required: false
    default: standard
  format:
    description: "Report format: markdown, json, sarif, or agent."
    required: false
    default: markdown
  output:
    description: Output report path.
    required: false
    default: rrdoctor-report.md
  fail-on:
    description: "Failure threshold: none, error, or warning."
    required: false
    default: error
  baseline:
    description: Optional baseline JSON report to compare against.
    required: false
    default: ""
  fail-on-new:
    description: "With baseline, fail only on new findings: none, error, or warning."
    required: false
    default: ""
  plan:
    description: Also generate an agent-ready fix plan (rrdoctor-plan.md).
    required: false
    default: "false"
  appendix:
    description: Also generate an Artifact Evaluation appendix/checklist.
    required: false
    default: "false"
  appendix-output:
    description: Artifact appendix output path.
    required: false
    default: ARTIFACT_APPENDIX.md
  verify:
    description: Also generate a reproducibility verification ladder report.
    required: false
    default: "false"
  verify-run:
    description: "Run dynamic verification steps. Executes target repository code; only use on trusted repositories."
    required: false
    default: "false"
  verify-output:
    description: Verification report output path.
    required: false
    default: rrdoctor-verify.md
  verify-timeout:
    description: Per-step timeout in seconds for dynamic verification.
    required: false
    default: "300"
  comment-pr:
    description: Post or update a sticky comment on the pull request with the report.
    required: false
    default: "false"
  step-summary:
    description: Write the report to the GitHub Actions job summary.
    required: false
    default: "true"
  upload-artifacts:
    description: Upload the report (and plan) as build artifacts.
    required: false
    default: "true"
  extra-args:
    description: Extra arguments passed to rrdoctor scan.
    required: false
    default: ""
outputs:
  exit-code:
    description: rrdoctor scan exit code before the final enforcement step.
    value: ${{ steps.audit.outputs.code }}
  report-path:
    description: Path to the generated report.
    value: ${{ steps.paths.outputs.report-path }}
  plan-path:
    description: Path to the generated fix plan when plan is true.
    value: ${{ steps.paths.outputs.plan-path }}
  appendix-path:
    description: Path to the generated Artifact Evaluation appendix when appendix is true.
    value: ${{ steps.paths.outputs.appendix-path }}
  verify-path:
    description: Path to the generated verification report when verify is true.
    value: ${{ steps.paths.outputs.verify-path }}
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Research Repo Doctor
      shell: bash
      run: python -m pip install "${{ github.action_path }}"
    - name: Run Research Repo Doctor
      id: audit
      shell: bash
      env:
        RRD_PATH: ${{ inputs.path }}
        RRD_CONFIG: ${{ inputs.config }}
        RRD_PROFILE: ${{ inputs.profile }}
        RRD_FORMAT: ${{ inputs.format }}
        RRD_OUTPUT: ${{ inputs.output }}
        RRD_FAIL_ON: ${{ inputs.fail-on }}
        RRD_BASELINE: ${{ inputs.baseline }}
        RRD_FAIL_ON_NEW: ${{ inputs.fail-on-new }}
        RRD_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -uo pipefail
        args=(scan "$RRD_PATH" --profile "$RRD_PROFILE" --format "$RRD_FORMAT" --output "$RRD_OUTPUT")
        if [ -n "$RRD_CONFIG" ]; then args+=(--config "$RRD_CONFIG"); fi
        if [ -n "$RRD_BASELINE" ]; then
          args+=(--baseline "$RRD_BASELINE")
          if [ -n "$RRD_FAIL_ON_NEW" ]; then args+=(--fail-on-new "$RRD_FAIL_ON_NEW"); fi
        else
          args+=(--fail-on "$RRD_FAIL_ON")
        fi
        # shellcheck disable=SC2086
        rrdoctor "${args[@]}" $RRD_EXTRA_ARGS
        echo "code=$?" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Record output paths
      id: paths
      shell: bash
      env:
        RRD_OUTPUT: ${{ inputs.output }}
        RRD_APPENDIX_OUTPUT: ${{ inputs.appendix-output }}
        RRD_VERIFY_OUTPUT: ${{ inputs.verify-output }}
      run: |
        echo "report-path=$RRD_OUTPUT" >> "$GITHUB_OUTPUT"
        echo "plan-path=rrdoctor-plan.md" >> "$GITHUB_OUTPUT"
        echo "appendix-path=$RRD_APPENDIX_OUTPUT" >> "$GITHUB_OUTPUT"
        echo "verify-path=$RRD_VERIFY_OUTPUT" >> "$GITHUB_OUTPUT"
    - name: Generate fix plan
      if: ${{ inputs.plan == 'true' }}
      shell: bash
      env:
        RRD_PATH: ${{ inputs.path }}
        RRD_PROFILE: ${{ inputs.profile }}
      run: rrdoctor plan "$RRD_PATH" --profile "$RRD_PROFILE" --output rrdoctor-plan.md
    - name: Generate artifact appendix
      if: ${{ inputs.appendix == 'true' }}
      shell: bash
      env:
        RRD_PATH: ${{ inputs.path }}
        RRD_PROFILE: ${{ inputs.profile }}
        RRD_APPENDIX_OUTPUT: ${{ inputs.appendix-output }}
      run: rrdoctor appendix "$RRD_PATH" --profile "$RRD_PROFILE" --output "$RRD_APPENDIX_OUTPUT"
    - name: Generate verification report
      if: ${{ inputs.verify == 'true' }}
      shell: bash
      env:
        RRD_PATH: ${{ inputs.path }}
        RRD_CONFIG: ${{ inputs.config }}
        RRD_PROFILE: ${{ inputs.profile }}
        RRD_VERIFY_RUN: ${{ inputs.verify-run }}
        RRD_VERIFY_OUTPUT: ${{ inputs.verify-output }}
        RRD_VERIFY_TIMEOUT: ${{ inputs.verify-timeout }}
      run: |
        set -uo pipefail
        args=(verify "$RRD_PATH" --profile "$RRD_PROFILE" --timeout "$RRD_VERIFY_TIMEOUT" --output "$RRD_VERIFY_OUTPUT" --fail-on none)
        if [ -n "$RRD_CONFIG" ]; then args+=(--config "$RRD_CONFIG"); fi
        if [ "$RRD_VERIFY_RUN" = "true" ]; then args+=(--run); fi
        rrdoctor "${args[@]}"
    - name: Write job summary
      if: ${{ inputs.step-summary == 'true' }}
      shell: bash
      env:
        RRD_OUTPUT: ${{ inputs.output }}
        RRD_APPENDIX_OUTPUT: ${{ inputs.appendix-output }}
        RRD_VERIFY_OUTPUT: ${{ inputs.verify-output }}
      run: |
        set -uo pipefail
        if [ -f "$RRD_OUTPUT" ]; then cat "$RRD_OUTPUT" >> "$GITHUB_STEP_SUMMARY"; fi
        if [ -f rrdoctor-plan.md ]; then
          { echo ""; echo "---"; echo ""; cat rrdoctor-plan.md; } >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -f "$RRD_APPENDIX_OUTPUT" ]; then
          { echo ""; echo "---"; echo ""; cat "$RRD_APPENDIX_OUTPUT"; } >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -f "$RRD_VERIFY_OUTPUT" ]; then
          { echo ""; echo "---"; echo ""; cat "$RRD_VERIFY_OUTPUT"; } >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Comment on pull request
      if: ${{ inputs.comment-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RRD_OUTPUT: ${{ inputs.output }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        set -uo pipefail
        marker="<!-- rrdoctor-report -->"
        { echo "$marker"; cat "$RRD_OUTPUT"; } > rrdoctor-comment.md
        existing=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id // empty")
        if [ -n "$existing" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$existing" -F body=@rrdoctor-comment.md >/dev/null
        else
          gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" -F body=@rrdoctor-comment.md >/dev/null
        fi
    - name: Upload report
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: rrdoctor-report
        path: |
          ${{ inputs.output }}
          rrdoctor-plan.md
          ${{ inputs.appendix-output }}
          ${{ inputs.verify-output }}
        if-no-files-found: ignore
    - name: Enforce result
      shell: bash
      run: exit ${{ steps.audit.outputs.code }}
