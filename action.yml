name: Research Repo Doctor
description: Audit a research code repository for reproducibility and release readiness.
author: Research Repo Doctor Maintainers
inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  config:
    description: Optional path to .rrdoctor.yml.
    required: false
    default: ""
  profile:
    description: "Scan profile: minimal, standard, strict, or ml."
    required: false
    default: standard
  format:
    description: "Report format: markdown, json, or sarif."
    required: false
    default: markdown
  output:
    description: Output report path.
    required: false
    default: rrdoctor-report.md
  fail-on:
    description: "Failure threshold: none, error, or warning."
    required: false
    default: error
  extra-args:
    description: Extra arguments passed to rrdoctor scan.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Research Repo Doctor
      shell: bash
      run: python -m pip install "${{ github.action_path }}"
    - name: Run Research Repo Doctor
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_ARG=""
        if [ -n "${{ inputs.config }}" ]; then
          CONFIG_ARG="--config ${{ inputs.config }}"
        fi
        rrdoctor scan "${{ inputs.path }}" \
          $CONFIG_ARG \
          --profile "${{ inputs.profile }}" \
          --format "${{ inputs.format }}" \
          --output "${{ inputs.output }}" \
          --fail-on "${{ inputs.fail-on }}" \
          ${{ inputs.extra-args }}
