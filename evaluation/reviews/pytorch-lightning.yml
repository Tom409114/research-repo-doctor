notes: >
  Focused review for a mature ML training framework. The scan originally
  treated a contextvar-style token returned by `_given_hyperparameters.set(...)`
  as a committed secret. RRD090 now skips token variables assigned from local
  function or method calls while keeping random credential-like values in
  ordinary configuration files actionable.
