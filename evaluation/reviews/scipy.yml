confirmed_absent:
  - rule_id: RRD010
    evidence: SciPy uses a root LICENSE.txt file; rrdoctor now treats common LICENSE.* and COPYING.* filenames as license evidence.
  - rule_id: RRD043
    evidence: CI/devcontainer paths and documented placeholder paths such as /home/... and Windows <user> cache paths are ignored as non-data-path examples.
