notes: >
  Focused review for a mature scientific Python package. The review found two
  first-run trust problems: RRD010 did not recognize SciPy's LICENSE.txt, and
  RRD043 treated CI/devcontainer paths plus documentation placeholders as local
  research data paths. Both are now regression-gated as expected-absent. The
  remaining findings are broader artifact-preparation signals and need separate
  policy review before being classified as false positives.
