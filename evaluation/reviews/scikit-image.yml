notes: >
  Focused review for a mature scientific Python package. The scan originally
  treated a long `token=` query parameter in a documented public image URL as a
  committed secret. RRD090 now ignores ordinary URL query `token=` values while
  retaining provider-specific secret patterns such as OpenAI, GitHub, and AWS
  key formats.
