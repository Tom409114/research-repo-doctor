version: 1
description: >
  Seed public-repository corpus for checking rrdoctor rule signal quality.
  Entries store only public URLs and review notes; no third-party code is copied.
review_goal: >
  Expand to 50-100 recent research artifacts, manually review false positives
  and false negatives, then publish aggregate results without ranking individual
  maintainers.
repositories:
  - name: nanoGPT
    url: https://github.com/karpathy/nanoGPT
    ecosystem: python-ml
    reason: Root-level train.py, README run commands, notebooks, and data prep scripts.
    expected_absent: [RRD050, RRD063]
    review_focus: [entrypoint-detection, notebook-secret-heuristics, data-prep-docs]
  - name: segment-anything
    url: https://github.com/facebookresearch/segment-anything
    ecosystem: python-ml
    reason: Model artifact repo with notebooks, checkpoint links, and inference examples.
    expected_absent: [RRD050]
    review_focus: [notebooks, model-checkpoints, install-docs]
